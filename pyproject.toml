[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.ruff]
line-length = 88
exclude = [
  ".venv",
  "build",
  "dist",
  "tests/proto/compiled",  # <- seu diretório alvo aqui
]
