syntax = "proto3";
enum MyEnum {
    VALID = 0;
    INVALID = 1;
}
enum Enum2 {
    FOO = 0;
    BAR = 1;
}
message Hello {
  string c = 1;
  string d = 2;
  uint32 e = 3;
  int64 f = 4;
  MyEnum g = 5;
  Enum2 h = 6;
  fixed64 i = 7;
  repeated string j = 8;
  repeated bool k = 9;
  map<string, MyEnum> l = 10;
  map<int32, bytes> m = 11;
  oneof choice {
    string a = 12;
    int32 aa = 13;
    string bb = 14;
    bytes b = 15;
}
  oneof outro {
    int64 y = 16;
    bool z = 17;
}
}